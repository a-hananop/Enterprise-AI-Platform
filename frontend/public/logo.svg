<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="nexusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8bff" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3" flood-color="#4f8bff"/>
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="24" fill="url(#nexusGrad)" filter="url(#shadow)" />
  
  <g transform="translate(20, 20) scale(2.5)">
    <polygon 
      points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" 
      fill="#ffffff" 
